services:
  - type: web
    name: surplus-website
    runtime: node
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_SEGMENT_ID
        sync: false
      - key: WAITLIST_FROM_EMAIL
        value: Surplus <hello@liveinsurplus.com>
      - key: SITE_URL
        value: https://liveinsurplus.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_FOUNDING_PRICE_ID
        sync: false
      - key: STRIPE_REGULAR_PRICE_ID
        sync: false
